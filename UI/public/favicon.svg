<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="ask-app">
  <!-- The white "mind" mark on the dark app tile, pre-rendered to a bitmap and embedded:
       Chrome's favicon rasterizer runs without CSS filters or emoji fonts, so the styled
       emoji version rendered blank there (falling back to the letter tile). This image is
       the exact same mark produced at build time with the filter applied. -->
  <image width="128" height="128" href="data:image/png;base64,"/>
</svg>
