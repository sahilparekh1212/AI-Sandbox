# TEMPLATE — copy to secret.yaml (gitignored) and fill in real values, or create the
# Secret imperatively instead of committing it:
#   oc create secret generic postgres-secret -n ask-app \
#     --from-literal=POSTGRES_USER=audit \
#     --from-literal=POSTGRES_PASSWORD='<strong-password>' \
#     --from-literal=POSTGRES_DB=auditdb
#
# Consumed by two workloads: the postgres Deployment (envFrom) initializes the database/user from
# these, and the audit Deployment maps POSTGRES_USER/POSTGRES_PASSWORD onto SPRING_DATASOURCE_*
# (see openshift/audit/deployment.yaml). The database name also appears in the audit datasource URL
# (openshift/audit/configmap.yaml) — keep POSTGRES_DB and that URL's db in sync.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: ask-app
type: Opaque
stringData:
  POSTGRES_USER: "audit"
  POSTGRES_PASSWORD: "REPLACE_WITH_STRONG_PASSWORD"
  POSTGRES_DB: "auditdb"
