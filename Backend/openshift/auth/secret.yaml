# Generate an RSA key pair and base64-encode the PKCS8 private key:
#   openssl genrsa -out private.pem 2048
#   openssl pkcs8 -topk8 -inform PEM -outform PEM -nocrypt -in private.pem -out private_pkcs8.pem
# Then paste the PEM content (with headers) as the value below.
apiVersion: v1
kind: Secret
metadata:
  name: auth-secret
  namespace: ai-sandbox
type: Opaque
stringData:
  GOOGLE_CLIENT_ID: "your-google-client-id"
  GOOGLE_CLIENT_SECRET: "your-google-client-secret"
  AUTH_RSA_PRIVATE_KEY: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_WITH_BASE64_ENCODED_PKCS8_PRIVATE_KEY
    -----END PRIVATE KEY-----
