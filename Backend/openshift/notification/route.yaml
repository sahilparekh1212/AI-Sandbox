apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: notification-service
  namespace: ai-sandbox
  labels:
    app: notification-service
spec:
  to:
    kind: Service
    name: notification-service
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
