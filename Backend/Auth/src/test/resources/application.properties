# Context smoke test runs under LOCAL. Auth signs/validates with its own in-process
# RSA key (JwtConfig), so no external JWKS is needed. Google is a built-in provider,
# so dummy client credentials are enough to wire the OAuth2 login filter.
spring.profiles.active=LOCAL
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
spring.security.oauth2.client.registration.google.scope=openid,profile,email
